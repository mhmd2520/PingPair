name: Deploy site to GitHub Pages

# Publishes the static marketing site in site/ to GitHub Pages.
#
# This workflow file is the SOURCE OF TRUTH in the private dev tree
# (PingPair-PrivDev) and is carried into the public repo by the allowlist
# export (publish/export-to-public.ps1 -> $IncludeDirs includes '.github').
# It must therefore be a no-op anywhere except the public repo: the job is
# gated on github.repository so a push to site/** in PrivDev (which has no
# Pages site configured) doesn't fail a build. Pages must be enabled on the
# public repo with Source = "GitHub Actions" for the deploy to take effect.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let a newer push supersede an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Only the public PingPair repo has Pages configured. Skip everywhere else
    # (notably the private PingPair-PrivDev mirror that owns this file).
    if: github.repository == 'mhmd2520/PingPair'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
